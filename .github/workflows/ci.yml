name: ci
on:
  pull_request:
    branches: [main]
jobs:
  foundation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync
        run: uv sync --all-extras --dev
      - name: Lint
        run: uv run ruff check . && uv run ruff format --check .
      - name: Tests (no DB)
        run: uv run pytest -m "not integration"
